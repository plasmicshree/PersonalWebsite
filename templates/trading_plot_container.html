{% set ticker = ticker.strip().upper() %}
<div class="flex flex-col gap-4 w-full">
    <!-- Top Row: Multi-column Flex (Telemetry Plot + Backtest KPIs) -->
    <div class="flex flex-col lg:flex-row gap-4 w-full items-start">
        <!-- Left Column: Main Telemetry Plot -->
        <div class="flex-1 min-w-0 flex flex-col gap-4">
            <div class="bg-slate-900 rounded-xl border border-slate-800 p-4 flex justify-between items-center">
                <h3 id="ticker-header-{{ ticker }}" class="text-sm font-black text-slate-200 uppercase tracking-widest">{{ ticker }} Telemetry Analysis</h3>
                <div id="current-signal-{{ ticker }}" class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest bg-slate-800 text-slate-500 border border-slate-700">
                    SIGNAL: CALIBRATING...
                </div>
            </div>
            <div id="plot-{{ ticker }}" class="w-full h-[333px] bg-slate-950/50 rounded-xl border border-slate-800 p-0 shadow-inner group overflow-hidden">
                <div class="flex items-center justify-center h-full animate-pulse bg-slate-900/50 rounded-lg">
                    <div class="flex flex-col items-center gap-2">
                        <div class="w-8 h-8 border-2 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
                        <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Rendering Candlesticks</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Backtest Performance Table (Now at Top) -->
        <div id="history-{{ ticker }}" class="lg:w-[400px] flex-shrink-0 bg-slate-900 rounded-xl border border-slate-800 p-5 hidden flex flex-col gap-6 shadow-2xl h-[384px]">
            <div class="flex flex-col">
                <h3 class="text-xs font-black text-slate-200 mb-4 uppercase tracking-[0.2em]">Backtest KPIs</h3>
                <div id="aggregate-{{ ticker }}" class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-800/50 p-2 rounded-xl border border-slate-700/50 text-center">
                        <p class="text-slate-500 uppercase font-black text-[10px] tracking-widest">Iterations</p>
                        <p id="total-trades-{{ ticker }}" class="text-sm font-black text-white font-mono">0</p>
                    </div>
                    <div class="bg-slate-800/50 p-2 rounded-xl border border-slate-700/50 text-center">
                        <p class="text-slate-500 uppercase font-black text-[10px] tracking-widest">Accuracy</p>
                        <p id="win-rate-{{ ticker }}" class="text-sm font-black text-white font-mono">0%</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto border border-slate-800 rounded-xl bg-slate-950/30">
                <table class="min-w-full text-xs text-left sticky-header">
                    <thead class="bg-slate-900 text-slate-500 uppercase font-black tracking-widest sticky top-0 border-b border-slate-800">
                        <tr>
                            <th class="px-3 py-3">Type</th>
                            <th class="px-3 py-3">Epoch</th>
                            <th class="px-3 py-3 text-right">PnL %</th>
                            <th class="px-3 py-3 text-right">Mult.</th>
                        </tr>
                    </thead>
                    <tbody id="history-body-{{ ticker }}" class="divide-y divide-slate-800/50 font-mono text-slate-400">
                        <!-- Rows added via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Unified intelligence Master-Chart (Combined Technical + ML) -->
    <div class="w-full flex flex-col gap-4">
        <div class="bg-slate-900/80 rounded-xl border border-sky-500/20 p-4">
            <h3 class="text-[10px] font-black text-sky-400 flex items-center gap-2 uppercase tracking-[0.2em]">
                <span class="flex h-2 w-2 rounded-full bg-sky-500 animate-pulse"></span>
                Unified intelligence Master-Chart (Historical + 21D Forecast)
            </h3>
        </div>
        <div id="unified-plot-{{ ticker }}" class="w-full h-[300px] bg-slate-950/80 rounded-xl border border-slate-800 p-0 shadow-2xl overflow-hidden">
            <div class="flex items-center justify-center h-full">
                <span class="text-[10px] font-bold text-slate-700 uppercase tracking-widest">Synthesizing Data Streams...</span>
            </div>
        </div>
    </div>

    <!-- Bottom Row: Multi-column Side-by-Side (Now Full Width AI matrix) -->

<script>
(function() {
    const ticker = "{{ ticker }}".trim().toUpperCase();
    const plotDiv = document.getElementById('plot-' + ticker);
    const historyDiv = document.getElementById('history-' + ticker);
    const historyBody = document.getElementById('history-body-' + ticker);
    const currentSignalEl = document.getElementById('current-signal-' + ticker);
    const tickerHeaderEl = document.getElementById('ticker-header-' + ticker);

    // Aggregate elements
    const totalTradesEl = document.getElementById('total-trades-' + ticker);
    const winRateEl = document.getElementById('win-rate-' + ticker);
    const mlForecastBody = document.getElementById('ml-forecast-body-' + ticker);

    let hasBacktestSignals = false;
    let hasMLPredictions = false;

    // Fetch ML Forecast (with cache busting)
    fetch('/projects/trading-analytics/api/ml-forecast/' + ticker + '?t=' + new Date().getTime())
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok: ' + response.statusText);
            }
            return response.json();
        })
        .then(data => {
            if (data.error) {
                mlForecastBody.innerHTML = `<p class="text-gray-400 italic">${data.error}</p>`;
                return;
            }
            // Store data globally so the Unified plot can access metrics if needed
            window.latestMLForecastData = data;

            // If the technical data has already arrived, refresh the unified plot to show Hit Rates
            if (window.latestTechnicalData) {
                renderUnifiedPlot(window.latestTechnicalData);
            }

            if (!data.models || Object.keys(data.models).length === 0) {
                mlForecastBody.innerHTML = '<p class="text-gray-400 italic">No AI forecast models available.</p>';
                return;
            }

            const traces = [];
            const colors = {
                'AutoARIMA': '#8b5cf6', // purple-500
                'LightGBM': '#6366f1',  // indigo-500
                'Theta': '#10b981',     // emerald-500
                'CatBoost': '#f59e0b',  // amber-500
                'RandomForest': '#3b82f6' // blue-500
            };

            let allDatesSet = new Set();
            for (const [modelName, predictions] of Object.entries(data.models)) {
                predictions.forEach(p => allDatesSet.add(p.date));
                // Ensure predictions are sorted by date string
                const sortedPredictions = predictions.sort((a, b) => a.date.localeCompare(b.date));

                const hitRateVal = data.hit_rates ? data.hit_rates[modelName] : null;
                const hitRate = (hitRateVal !== null && hitRateVal !== undefined)
                    ? (hitRateVal * 100).toFixed(0) + '%'
                    : 'N/A';

                const modelColor = colors[modelName] || '#3b82f6';
                const isBestModel = data.best_model && modelName === data.best_model;

                // Check if this model has prediction intervals AND is the best model
                const hasIntervals = isBestModel && predictions.some(p => p.lower_bound_80 !== undefined && p.upper_bound_80 !== undefined);

                if (hasIntervals) {
                    const intervalX = sortedPredictions.map(p => p.date);
                    traces.push({
                        x: intervalX.concat(intervalX.slice().reverse()),
                        y: sortedPredictions.map(p => p.upper_bound_80).concat(sortedPredictions.map(p => p.lower_bound_80).reverse()),
                        fill: 'toself',
                        fillcolor: modelColor + '15',
                        line: { color: 'transparent' },
                        name: `80% Range`,
                        showlegend: true,
                        hoverinfo: 'skip'
                    });
                }

                const legendName = isBestModel
                    ? `<b>${modelName}</b> (Hit: ${hitRate})`
                    : `${modelName} (${hitRate})`;

                traces.push({
                    x: sortedPredictions.map(p => p.date),
                    y: sortedPredictions.map(p => p.price),
                    mode: 'lines+markers',
                    name: legendName,
                    line: { color: modelColor, width: isBestModel ? 3 : 1.5, shape: 'linear' },
                    marker: { size: 4 },
                    hovertemplate: '<b>' + modelName + '</b>: $%{y:.2f}<extra></extra>'
                });
            }

            const categoryDates = Array.from(allDatesSet).sort();

            const layout = {
                autosize: true,
                height: 400,
                margin: { t: 10, b: 40, l: 40, r: 10 }, // Balanced margins
                showlegend: true,
                legend: {
                    orientation: 'h',
                    y: -0.3,
                    x: 0.5,
                    xanchor: 'center',
                    font: { size: 10, color: '#94a3b8' },
                    bgcolor: 'rgba(15, 23, 42, 0.5)',
                    bordercolor: '#1e293b',
                    borderwidth: 1
                },
                xaxis: {
                    type: 'category',
                    categoryorder: 'array',
                    categoryarray: categoryDates,
                    tickfont: { size: 10, color: '#64748b' },
                    gridcolor: '#1e293b',
                    automargin: true,
                    fixedrange: true,
                    tickangle: -45, // Sharper angle for more space
                    ticktext: categoryDates.map(d => {
                        const dateParts = d.split('-');
                        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                        return monthNames[parseInt(dateParts[1])-1] + " " + dateParts[2];
                    }),
                    tickvals: categoryDates,
                    linecolor: '#334155'
                },
                yaxis: {
                    tickfont: { size: 10, color: '#64748b' },
                    gridcolor: '#1e293b',
                    autorange: true,
                    title: { text: 'Price ($)', font: { size: 10, color: '#64748b' } },
                    automargin: true,
                    fixedrange: true,
                    linecolor: '#334155'
                },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                hovermode: 'x unified',
                hoverlabel: { font: { color: '#000000', size: 13 } }
            };

            mlForecastBody.innerHTML = '';
            const chartDiv = document.createElement('div');
            // Use classes for sizing and ensure no overflow constraints
            chartDiv.className = 'w-full h-[400px] min-w-0';
            mlForecastBody.appendChild(chartDiv);

            hasMLPredictions = true;

            // Layout shift - sidebar appears
            if (hasBacktestSignals || hasMLPredictions) {
                historyDiv.classList.remove('hidden');
                historyDiv.classList.add('flex');
            }

            // High Precision Render: Wait for next frame, then check width, then render
            requestAnimationFrame(() => {
                Plotly.newPlot(chartDiv, traces, layout, {
                    displayModeBar: false,
                    responsive: true
                });

                // Final safety resize after a small delay to catch any transition ends
                setTimeout(() => {
                    Plotly.Plots.resize(chartDiv);
                }, 200);
            });
        })
        .catch(err => {
            console.error('Error fetching ML forecast for ' + ticker + ':', err);
            mlForecastBody.innerHTML = `<p class="text-red-400 italic">Error loading AI forecast: ${err.message}</p>`;
        });

    fetch('/projects/trading-analytics/api/plot-data/' + ticker)
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {
                    throw new Error(err.detail || 'Failed to load plot data');
                });
            }
            return response.json();
        })
        .then(data => {
            if (!data) {
                plotDiv.innerHTML = '<p class="text-red-500 p-4">Error loading data for ' + ticker + '</p>';
                return;
            }

            // Store technical data globally
            window.latestTechnicalData = data;

            if (!data.dates || data.dates.length === 0) {
                plotDiv.innerHTML = '<p class="text-gray-500 p-4">No historical data available for ' + ticker + '</p>';
                return;
            }

            // Update Header with confirmation days
            if (tickerHeaderEl && data.confirmation_days) {
                tickerHeaderEl.innerText = `${ticker} Analysis (${data.confirmation_days}-Day Confirmation)`;
            }

            // Update Signal Badge
            if (currentSignalEl) {
                currentSignalEl.innerText = 'Signal: ' + (data.signal || 'None');
                if (data.signal && data.signal.includes('BUY')) {
                    currentSignalEl.className = 'px-3 py-1 rounded-full text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/30';
                } else if (data.signal && data.signal.includes('SELL')) {
                    currentSignalEl.className = 'px-3 py-1 rounded-full text-xs font-bold bg-rose-500/10 text-rose-400 border border-rose-500/30';
                } else {
                    currentSignalEl.className = 'px-3 py-1 rounded-full text-xs font-bold bg-slate-800 text-slate-400 border border-slate-700';
                }
            }

            const dates = data.dates;

            // Trace 1: Price
            const tracePrice = {
                x: dates,
                y: data.close,
                type: 'scatter',
                mode: 'lines',
                name: 'Price',
                line: {color: '#38bdf8', width: 2}
            };

            // MA Traces
            const traceMA20 = {
                x: dates,
                y: data.ma20,
                type: 'scatter',
                mode: 'lines',
                name: 'MA20',
                line: {width: 1, opacity: 0.7}
            };
            const traceMA50 = {
                x: dates,
                y: data.ma50,
                type: 'scatter',
                mode: 'lines',
                name: 'MA50',
                line: {width: 1, opacity: 0.7}
            };
            const traceMA200 = {
                x: dates,
                y: data.ma200,
                type: 'scatter',
                mode: 'lines',
                name: 'MA200',
                line: {width: 1.5, color: 'red'}
            };

            // Backtest Signals
            const buySignals = data.backtest_signals.filter(s => s.type === 'BUY');
            const sellSignals = data.backtest_signals.filter(s => s.type === 'SELL');

            const traceBuy = {
                x: buySignals.map(s => s.date),
                y: buySignals.map(s => s.price),
                mode: 'markers',
                name: 'Backtest BUY',
                marker: {symbol: 'triangle-up', size: 12, color: 'green'}
            };

            const traceSell = {
                x: sellSignals.map(s => s.date),
                y: sellSignals.map(s => s.price),
                mode: 'markers',
                name: 'Backtest SELL',
                marker: {symbol: 'triangle-down', size: 12, color: 'red'}
            };

            // RSI Trace
            const traceRSI = {
                x: dates,
                y: data.rsi,
                type: 'scatter',
                mode: 'lines',
                name: 'RSI',
                line: {color: 'purple'},
                xaxis: 'x',
                yaxis: 'y2'
            };
            const traceRSIDynamic = {
                x: dates,
                y: data.rsi_dynamic,
                type: 'scatter',
                mode: 'lines',
                name: 'Dynamic Oversold',
                line: {color: 'darkgreen', dash: 'dot', width: 1},
                fill: 'tozeroy',
                fillcolor: 'rgba(0, 255, 0, 0.1)',
                xaxis: 'x',
                yaxis: 'y2'
            };
            const traceRSIOverbought = {
                x: [dates[0], dates[dates.length-1]],
                y: [70, 70],
                type: 'scatter',
                mode: 'lines',
                name: 'Overbought (70)',
                line: {color: 'red', dash: 'dash', width: 1},
                xaxis: 'x',
                yaxis: 'y2',
                showlegend: false,
                hoverinfo: 'skip'
            };
            const traceRSIOversold = {
                x: [dates[0], dates[dates.length-1]],
                y: [30, 30],
                type: 'scatter',
                mode: 'lines',
                name: 'Oversold (30)',
                line: {color: 'green', dash: 'dash', width: 1},
                xaxis: 'x',
                yaxis: 'y2',
                showlegend: false,
                hoverinfo: 'skip'
            };

            // MACD Traces
            const traceMACD = {
                x: dates,
                y: data.macd,
                type: 'scatter',
                mode: 'lines',
                name: 'MACD',
                line: {color: '#38bdf8', width: 1.5},
                xaxis: 'x',
                yaxis: 'y3'
            };
            const traceMACDSignal = {
                x: dates,
                y: data.macd_signal,
                type: 'scatter',
                mode: 'lines',
                name: 'Signal',
                line: {color: '#fb923c', width: 1.5},
                xaxis: 'x',
                yaxis: 'y3'
            };
            const traceMACDHist = {
                x: dates,
                y: data.macd_hist,
                type: 'bar',
                name: 'Hist',
                marker: {color: '#475569', opacity: 0.5},
                xaxis: 'x',
                yaxis: 'y3'
            };

            // Shapes for Trade Zones and Table Rows
            const shapes = [];
            let lastBuyDate = null;
            let lastBuyPrice = null;

            // Aggregate Stats
            let totalTrades = 0;
            let winningTrades = 0;
            let cumulativePnl = 0;
            let currentCapital = 500.0; // Matches Backtester.py initial_capital
            const initialCapital = 500.0;
            const commission = 1.0;     // Matches Backtester.py commission per order ($2 round trip)

            // Sort signals chronologically
            const sortedSignals = [...data.backtest_signals].sort((a, b) => new Date(a.date) - new Date(b.date));

            hasBacktestSignals = sortedSignals.length > 0;

            if (hasBacktestSignals || hasMLPredictions) {
                historyDiv.classList.remove('hidden');
                historyDiv.classList.add('flex');
            }

            sortedSignals.forEach(s => {
                // Add vertical line for every signal
                shapes.push({
                    type: 'line',
                    xref: 'x',
                    yref: 'paper',
                    x0: s.date,
                    y0: 0,
                    x1: s.date,
                    y1: 1,
                    line: {
                        color: s.type === 'BUY' ? 'green' : 'red',
                        width: 2,
                        dash: 'dash'
                    },
                    layer: 'above'
                });

                let pnlText = "-";
                let pnlClass = "text-gray-500";

                if (s.type === 'BUY') {
                    lastBuyDate = s.date;
                    lastBuyPrice = s.price; // Stored price already includes slippage
                } else if (s.type === 'SELL' && lastBuyDate) {
                    totalTrades++;
                    const sellPrice = s.price; // Stored price already includes slippage
                    const pnl = ((sellPrice - lastBuyPrice) / lastBuyPrice) * 100;
                    cumulativePnl += pnl;

                    // Real-world Compounded Growth Calculation (including fees)
                    // Note: price already includes slippage from Backtester logic
                    const shares = Math.floor((currentCapital - commission) / lastBuyPrice);
                    if (shares > 0) {
                        const cost = (shares * lastBuyPrice) + commission;
                        const revenue = (shares * sellPrice) - commission;
                        currentCapital = (currentCapital - cost) + revenue;
                    }

                    if (pnl > 0) winningTrades++;

                    pnlText = pnl.toFixed(2) + "%";
                    pnlClass = pnl >= 0 ? "text-emerald-400 font-bold" : "text-rose-400 font-bold";

                    const color = pnl >= 0 ? 'rgba(16, 185, 129, 0.15)' : 'rgba(244, 63, 94, 0.15)';
                    shapes.push({
                        type: 'rect',
                        xref: 'x',
                        yref: 'paper',
                        x0: lastBuyDate,
                        y0: 0,
                        x1: s.date,
                        y1: 1,
                        fillcolor: color,
                        line: {width: 0},
                        layer: 'below'
                    });
                    lastBuyDate = null;
                }

                // Add row to table
                const row = document.createElement('tr');
                row.className = 'border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors';

                const currentMultiplier = currentCapital / initialCapital;
                const multiplierText = s.type === 'SELL' ? currentMultiplier.toFixed(2) + "x" : "-";
                const multiplierClass = s.type === 'SELL' ? (currentMultiplier >= 1 ? "text-slate-200" : "text-slate-500") : "text-slate-600";

                row.innerHTML = `
                    <td class="px-3 py-2 font-bold ${s.type === 'BUY' ? 'text-emerald-400' : 'text-rose-400'}">${s.type}</td>
                    <td class="px-3 py-2 text-slate-400 text-xs">${s.date}</td>
                    <td class="px-3 py-2 text-xs text-right ${pnlClass}">${pnlText}</td>
                    <td class="px-3 py-2 text-xs text-right font-bold ${multiplierClass}">${multiplierText}</td>
                `;
                historyBody.appendChild(row);
            });

            // Update Aggregate Stats
            // Hard Sync: Priority 1: Use the pre-calculated metrics from the database
            // This ensures the summary and the deep-dive table reflect the same strategy logic.
            if (data.backtest_performance && data.backtest_performance.completed_trades !== undefined) {
                totalTradesEl.innerText = data.backtest_performance.completed_trades;
                winRateEl.innerText = (data.backtest_performance.win_rate || 0).toFixed(1) + "%";
            } else if (totalTrades > 0) {
                // Fallback only if database metrics are missing
                totalTradesEl.innerText = totalTrades;
                const winRate = (winningTrades / totalTrades) * 100;
                winRateEl.innerText = winRate.toFixed(1) + "%";
            }

            // Handle open trade (BUY without SELL)
            if (lastBuyDate) {
                const currentPrice = data.close[data.close.length - 1];
                const pnl = ((currentPrice - lastBuyPrice) / lastBuyPrice) * 100;
                const color = pnl >= 0 ? 'rgba(0, 255, 0, 0.15)' : 'rgba(255, 0, 0, 0.15)';
                shapes.push({
                    type: 'rect',
                    xref: 'x',
                    yref: 'paper',
                    x0: lastBuyDate,
                    y0: 0,
                    x1: dates[dates.length - 1],
                    y1: 1,
                    fillcolor: color,
                    line: {width: 0},
                    layer: 'below'
                });
            }

            const layout = {
                grid: {rows: 3, columns: 1, pattern: 'independent', roworder: 'top to bottom'},
                height: 333,
                margin: {t: 10, b: 40, l: 40, r: 10},
                showlegend: true,
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8', size: 9, family: 'JetBrains Mono, monospace' },
                legend: {
                    orientation: 'h',
                    y: -0.2,
                    font: { size: 9, color: '#94a3b8' },
                    bgcolor: 'rgba(15, 23, 42, 0.5)',
                    bordercolor: '#1e293b',
                    borderwidth: 1
                },
                xaxis: {
                    anchor: 'y3',
                    type: 'date',
                    nticks: 10,
                    tickformat: '%b %d',
                    rangeslider: {visible: false},
                    tickfont: { size: 9, color: '#64748b' },
                    gridcolor: '#1e293b',
                    linecolor: '#334155'
                },
                yaxis: {
                    domain: [0.5, 1],
                    title: { text: 'Price', font: { size: 9, color: '#64748b' } },
                    tickfont: { size: 9, color: '#64748b' },
                    gridcolor: '#1e293b',
                    linecolor: '#334155',
                    automargin: true
                },
                yaxis2: {
                    domain: [0.25, 0.45],
                    title: { text: 'RSI', font: { size: 9, color: '#64748b' } },
                    range: [0, 100],
                    tickfont: { size: 9, color: '#64748b' },
                    gridcolor: '#1e293b',
                    linecolor: '#334155',
                    automargin: true
                },
                yaxis3: {
                    domain: [0, 0.2],
                    title: { text: 'MACD', font: { size: 9, color: '#64748b' } },
                    tickfont: { size: 9, color: '#64748b' },
                    gridcolor: '#1e293b',
                    linecolor: '#334155',
                    automargin: true
                },
                shapes: shapes,
                hovermode: 'x unified',
                hoverlabel: { font: { color: '#000000', size: 13 } }
            };

            // Clear the loading spinner before rendering the plot
            plotDiv.innerHTML = '';

            const traces = [
                tracePrice, traceMA20, traceMA50, traceMA200, traceBuy, traceSell,
                traceRSI, traceRSIDynamic, traceRSIOverbought, traceRSIOversold,
                traceMACD, traceMACDSignal, traceMACDHist
            ];

            Plotly.newPlot(plotDiv, traces, layout, {responsive: true});

            // --- Render Unified Intelligence Master-Chart ---
            renderUnifiedPlot(data);
        })
        .catch(err => {
            console.error('Error fetching plot data for ' + ticker + ':', err);
            plotDiv.innerHTML = '<p class="text-red-500 p-4">Error loading plot data: ' + err.message + '</p>';
        });

    function renderUnifiedPlot(data) {
        const unifiedDiv = document.getElementById('unified-plot-' + ticker);
        if (!unifiedDiv) return;

        if (!data.prediction_intervals || Object.keys(data.prediction_intervals).length === 0) {
            unifiedDiv.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500 text-[10px] uppercase font-bold bg-slate-900/50 rounded border border-slate-800/50">No 21D Forecast Predictions Found</div>';
            return;
        }

        const colors = {
            'AutoARIMA': '#8b5cf6', // purple-500
            'LightGBM': '#6366f1',  // indigo-500
            'Theta': '#10b981',     // emerald-500
            'CatBoost': '#f59e0b',  // amber-500
            'RandomForest': '#3b82f6' // blue-500
        };

        const bestModelName = data.best_model;
        const histLookback = 90;
        const histDates = data.dates.slice(-histLookback);
        const histClose = data.close.slice(-histLookback);

        const unifiedTraces = [];

        // 1. Trace: Historical Price
        unifiedTraces.push({
            x: histDates,
            y: histClose,
            type: 'scatter',
            mode: 'lines',
            name: 'Historical Price',
            line: { color: '#64748b', width: 2 }
        });

        // 2. Trace: MA50 (Overlay)
        unifiedTraces.push({
            x: histDates,
            y: (data.ma50 || []).slice(-histLookback),
            type: 'scatter',
            mode: 'lines',
            name: 'Trend (MA50)',
            line: { color: '#fb923c', width: 1, dash: 'dot', opacity: 0.6 }
        });

        let firstForecastDate = null;
        let annotPrice = null;

        // 3. Loop through all available models
        for (const [mName, forecast] of Object.entries(data.prediction_intervals)) {
            // Priority 1: Check hit_rates sent from plot_data (Unified)
            // Priority 2: Check global state if hit_rates is missing
            let hrRaw = null;
            if (data.hit_rates && data.hit_rates[mName] !== undefined) {
                hrRaw = data.hit_rates[mName];
            } else if (window.latestMLForecastData && window.latestMLForecastData.hit_rates) {
                hrRaw = window.latestMLForecastData.hit_rates[mName];
            }

            const hitRateStr = (hrRaw !== null && hrRaw !== undefined) ? (hrRaw * 100).toFixed(0) + '%' : 'N/A';
            const isBest = (mName === bestModelName);
            const mColor = colors[mName] || '#3b82f6';

            if (!firstForecastDate && forecast.dates && forecast.dates.length > 0) {
                firstForecastDate = forecast.dates[0];
                annotPrice = forecast.predicted_prices[0];
            }

            // Confidence Interval - Only show for the best model to avoid a messy chart
            if (isBest) {
                const hasBounds = forecast.upper_bound_80 && forecast.upper_bound_80.some(v => v !== null);
                if (hasBounds) {
                    unifiedTraces.push({
                        x: forecast.dates.concat([...forecast.dates].reverse()),
                        y: forecast.upper_bound_80.concat([...forecast.lower_bound_80].reverse()),
                        fill: 'toself',
                        fillcolor: mColor + '10', // 10% opacity for integration
                        line: { color: 'transparent' },
                        name: `${mName} 80% Range`,
                        showlegend: true,
                        hoverinfo: 'skip',
                        legendgroup: mName
                    });
                }
            }

            // Forecast line for this model
            unifiedTraces.push({
                x: forecast.dates,
                y: forecast.predicted_prices,
                type: 'scatter',
                mode: 'lines' + (isBest ? '+markers' : ''),
                name: isBest ? `<b>${mName}</b> (Hit: ${hitRateStr})` : `${mName} (${hitRateStr})`,
                legendgroup: mName,
                line: {
                    color: mColor,
                    width: isBest ? 3 : 2, // Reduced thickness for best model
                    dash: isBest ? 'solid' : 'dot' // Dots instead of dash for secondary
                },
                marker: isBest ? {
                    size: 5,
                    color: mColor,
                    line: { color: '#ffffff', width: 1 } // Add contrast border to markers
                } : { size: 0 },
                hovertemplate: '<b>' + mName + '</b>: $%{y:.2f}<extra></extra>'
            });
        }

        const unifiedLayout = {
            autosize: true,
            height: 300,
            margin: { t: 40, b: 60, l: 60, r: 40 },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#94a3b8', size: 10, family: 'JetBrains Mono, monospace' },
            xaxis: {
                type: 'date',
                gridcolor: '#1e293b',
                linecolor: '#334155',
                tickfont: { size: 9 },
                automargin: true,
                rangeslider: { visible: false }
            },
            yaxis: {
                gridcolor: '#1e293b',
                linecolor: '#334155',
                tickfont: { size: 9 },
                title: { text: 'Price ($)', font: { size: 10 } },
                automargin: true
            },
            legend: {
                orientation: 'h',
                y: -0.15,
                x: 0.5,
                xanchor: 'center',
                font: { size: 9 },
                bgcolor: 'rgba(15, 23, 42, 0.8)',
                bordercolor: '#1e293b',
                borderwidth: 1
            },
            hovermode: 'x unified',
            hoverlabel: { font: { color: '#000000', size: 13 } },
            annotations: firstForecastDate ? [
                {
                    x: firstForecastDate,
                    y: annotPrice,
                    xref: 'x',
                    yref: 'y',
                    text: 'FORECAST HORIZON ➔',
                    showarrow: true,
                    arrowhead: 2,
                    ax: -60,
                    ay: -40,
                    font: { size: 9, color: (colors[bestModelName] || '#38bdf8') },
                    arrowcolor: (colors[bestModelName] || '#38bdf8')
                }
            ] : []
        };

        unifiedDiv.innerHTML = '';
        Plotly.newPlot(unifiedDiv, unifiedTraces, unifiedLayout, { responsive: true, displayModeBar: false });
    }
})();
</script>
